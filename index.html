<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Habit Tracker</h1>

        <input type="text" id="habitInput" placeholder="Enter a habit">
        <input type="number" id="goalInput" placeholder="Daily goal">
        <button id="addBtn">Add Habit</button>
        <h3 id="progressText">Today: 0 / 0 completed</h3>
        <ul id="habitList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
